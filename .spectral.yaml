# Spectral configuratie voor API specificaties
#
# De Nederlandse API Design Rules zijn gebaseerd op de Logius standaard:
# https://gitdocumentatie.logius.nl/publicatie/api/adr/
#
# De onderstaande rulesets breiden de Nederlandse API Design Rules uit met
# regels die specifiek zijn voor de ZGW API's.
#
# Gebruik: spectral lint pad/naar/uw/openapi.yaml

extends:
 - [tools/spectral/adr-2.1.0-logius.yaml, off]
  # [tools/spectral/adr_don_corrected.yaml, off]
  #  - [tools/spectral/adr_kpa_corrected.yaml, off]
  # - [./tools/spectral/nlgov-api-design-rules.yaml, off]
  # - [./tools/spectral/zgw-api-design-rules.yaml, off]

# Alleen de eigen custom rules worden actief gehouden; alle ingebouwde
# spectral:oas rules zijn uitgeschakeld via de [ruleset, off] syntax.
rules:
  oas3-api-servers: error
  nlgov:openapi3: error
  nlgov:openapi-root-exists: error
  nlgov:missing-version-header: error
  nlgov:missing-header: error
  nlgov:include-major-version-in-uri: error
  nlgov:paths-no-trailing-slash: error
  nlgov:http-methods: error
  nlgov:paths-kebab-case: error
  nlgov:query-keys-camel-case: error
  nlgov:schema-camel-case: warn
  nlgov:servers-use-https: warn
  nlgov:use-problem-schema: warn


# De truc zit in `[tools/spectral/adr_don_corrected.yaml, off]` — dit laadt de ruleset (inclusief de ingebouwde `spectral:oas` regels die erin zitten) maar zet alles standaard op `off`. 
# Daarna worden alleen jouw 11 custom rules expliciet weer ingeschakeld met hun originele severity (`error` of `warn`).